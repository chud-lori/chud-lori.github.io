<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>lori@chud-lori.github.io:~$</title>
<meta name="description" content="You stripped the path off a project URL. Respect. — A terminal-style index of Lori's GitHub projects and links." />
<meta name="theme-color" content="#0a0d0a" />
<link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><rect width="16" height="16" fill="%230a0d0a"/><text x="1" y="13" font-family="monospace" font-size="14" font-weight="bold" fill="%234af56b">&gt;_</text></svg>' />

<meta property="og:title" content="lori@chud-lori.github.io:~$" />
<meta property="og:description" content="You stripped the path. Respect. Type `help` to see what's here." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://chud-lori.github.io/" />
<meta property="og:image" content="https://profile.lori.my.id/me.jpg" />
<meta property="og:image:type" content="image/jpeg" />
<meta property="og:image:alt" content="Lori — Senior Backend Engineer" />
<meta name="twitter:card" content="summary" />
<meta name="twitter:image" content="https://profile.lori.my.id/me.jpg" />
<meta name="twitter:image:alt" content="Lori — Senior Backend Engineer" />

<style>
:root {
  --bg: #0a0d0a;
  --fg: #4af56b;
  --fg-dim: #2a8f3e;
  --fg-bright: #b4ffc6;
  --warn: #ffb14a;
  --err: #ff5a5a;
  --font: ui-monospace, "SF Mono", "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace;
}
/* Amber palette swap, applied by the Konami egg. */
body.amber {
  --fg: #ffb454;
  --fg-dim: #a16a18;
  --fg-bright: #ffe0a8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; width: 100%; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.45;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* CRT chrome — scanlines + vignette + flicker. All overlays, none block input. */
body::before {
  content: "";
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.025) 0px,
    rgba(255,255,255,0.025) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
  z-index: 2;
  mix-blend-mode: overlay;
}
body::after {
  content: "";
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
  pointer-events: none;
  z-index: 3;
}
@keyframes flicker {
  0%, 100% { opacity: 1; }
  98% { opacity: 1; }
  99% { opacity: 0.93; }
}
.screen { animation: flicker 6s infinite; }

#screen {
  position: relative;
  height: 100%;
  width: 100%;
  padding: 24px 28px;
  overflow-y: auto;
  z-index: 1;
  text-shadow: 0 0 6px rgba(74, 245, 107, 0.35);
}
body.amber #screen { text-shadow: 0 0 6px rgba(255, 180, 84, 0.4); }

#output { white-space: pre-wrap; word-break: break-word; }
.line { white-space: pre-wrap; word-break: break-word; }
.echo .prompt { color: var(--fg-dim); }
.echo .cmd-text { color: var(--fg-bright); }
.dim { color: var(--fg-dim); }
.bright { color: var(--fg-bright); }
.warn { color: var(--warn); }
.err { color: var(--err); }
a { color: var(--fg-bright); text-decoration: underline; text-decoration-color: var(--fg-dim); }
a:hover { color: var(--bg); background: var(--fg-bright); text-decoration: none; }

#prompt-line {
  display: flex;
  align-items: center;
  white-space: pre;
}
#prompt-line .prompt { color: var(--fg-dim); flex: 0 0 auto; }
#cmd {
  flex: 1 1 auto;
  background: transparent;
  border: none;
  outline: none;
  color: var(--fg-bright);
  font: inherit;
  caret-color: var(--fg-bright);
  padding: 0;
  text-shadow: inherit;
  min-width: 0;
}

::selection { background: var(--fg); color: var(--bg); }

@media (max-width: 640px) {
  body { font-size: 13px; }
  #screen { padding: 14px 16px; }
}
</style>
</head>
<body>

<main id="screen" class="screen">
  <div id="output"></div>
  <div id="prompt-line">
    <span class="prompt">lori@chud-lori.github.io:~$&nbsp;</span><input
      id="cmd"
      type="text"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      aria-label="terminal input"
    />
  </div>
</main>

<script>
(() => {
  const out = document.getElementById('output');
  const cmd = document.getElementById('cmd');
  const screen = document.getElementById('screen');
  const PROMPT = 'lori@chud-lori.github.io:~$&nbsp;';

  const PROJECTS = {
    'rusty-requester': {
      url: 'https://chud-lori.github.io/rusty-requester/',
      desc: 'native http api client. rust + egui. ~15mb binary. postman without electron.'
    },
    'moco': {
      url: 'https://moco.lori.my.id/',
      desc: 'calm reader for personal libraries. pdf / epub / md. go + sqlite.'
    },
    'cornela': {
      url: 'https://github.com/chud-lori/cornela',
      desc: 'see repo for the pitch — solo side project.'
    },
    'milog': {
      url: 'https://github.com/chud-lori/milog',
      desc: 'see repo for the pitch — solo side project.'
    },
    'blog-mcp': {
      url: 'https://github.com/chud-lori/medium-blog-mcp',
      desc: 'mcp server that turns my blog into context for claude / cursor. python + chromadb.'
    },
    'knn-flask': {
      url: 'https://github.com/chud-lori/heart-disease-knn-flask',
      desc: 'heart-disease prediction. published paper. python + flask + knn.'
    },
    'profile': {
      url: 'https://profile.lori.my.id/',
      desc: 'the real portfolio. resume, experience, projects, writing.'
    }
  };

  const SOCIALS = {
    email:    'reachme@lori.my.id',
    github:   'https://github.com/chud-lori',
    linkedin: 'https://linkedin.com/in/chud-lori/',
    medium:   'https://chud-lori.medium.com/',
    profile:  'https://profile.lori.my.id/',
    blog:     'https://lori.my.id/'
  };

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  function linkify(s) {
    return s
      .replace(/(https?:\/\/[^\s)]+)/g, (u) => `<a href="${u}" target="_blank" rel="noopener">${u}</a>`)
      .replace(/([a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,})/gi, (e) => `<a href="mailto:${e}">${e}</a>`);
  }

  function print(text, cls = '') {
    const div = document.createElement('div');
    div.className = 'line ' + cls;
    div.innerHTML = linkify(text === null || text === undefined ? '' : String(text));
    out.appendChild(div);
    scrollDown();
  }

  function printRaw(html, cls = '') {
    const div = document.createElement('div');
    div.className = 'line ' + cls;
    div.innerHTML = html;
    out.appendChild(div);
    scrollDown();
  }

  function echoCommand(text) {
    const div = document.createElement('div');
    div.className = 'line echo';
    div.innerHTML = `<span class="prompt">${PROMPT}</span><span class="cmd-text">${escapeHtml(text)}</span>`;
    out.appendChild(div);
  }

  function scrollDown() {
    screen.scrollTop = screen.scrollHeight;
  }

  const BOOT = [
    '> chud-lori.os v1.0 — phosphor warmup complete',
    '',
    '[<span class="bright">OK</span>] mounting /home/lori .......... ok',
    '[<span class="bright">OK</span>] loading identity ............. lori',
    `[<span class="bright">OK</span>] indexing /projects ........... ${Object.keys(PROJECTS).length} found`,
    '[<span class="bright">OK</span>] socials online ............... ok',
    '',
    '<span class="dim">you stripped the path. respect.</span>',
    'type <span class="bright">help</span> to see what&rsquo;s here.',
    ''
  ];

  let bootTimer = null;
  let booted = false;

  function boot() {
    let i = 0;
    function tick() {
      if (i >= BOOT.length) { booted = true; cmd.focus(); return; }
      printRaw(BOOT[i++], 'boot');
      bootTimer = setTimeout(tick, i < 3 ? 140 : 70);
    }
    tick();
  }

  function skipBoot() {
    if (booted) return;
    clearTimeout(bootTimer);
    out.innerHTML = '';
    for (const l of BOOT) printRaw(l, 'boot');
    booted = true;
  }

  const COMMANDS = {
    help: () => printRaw([
      'usage: <span class="bright">&lt;command&gt;</span> [arg]',
      '',
      '  <span class="bright">about</span>          who I am',
      '  <span class="bright">projects</span>       what I&rsquo;ve shipped (alias: <span class="dim">ls</span>)',
      '  <span class="bright">open &lt;name&gt;</span>    navigate to a project',
      '  <span class="bright">contact</span>        how to reach me',
      '  <span class="bright">whois lori</span>     formal record',
      '  <span class="bright">uptime</span>         years coding, load avg',
      '  <span class="bright">now</span>            what I&rsquo;m doing this month',
      '  <span class="bright">clear</span>          clear the screen (alias: <span class="dim">cls</span>)',
      '  <span class="bright">help</span>           this list',
      '',
      '<span class="dim">↑/↓ history · tab autocomplete · ctrl+l clear</span>',
      ''
    ].join('\n')),

    about: () => print([
      'lori — senior backend engineer @ 99.co',
      'based in indonesia ·',
      '',
      '6+ years across go, python, javascript. now mostly rust on side projects.',
      'shipped backends at 99.co (prop-tech, 70M+ users), kredivo (fin-tech,',
      '1M+ DAU payments), and jublia (events + AI platforms).',
      '',
      'building tools to scratch my own itches. low-spec first. no electron.',
      '',
      'profile  : https://profile.lori.my.id/',
      'blog     : https://lori.my.id/',
      'github   : https://github.com/chud-lori',
      'linkedin : https://linkedin.com/in/chud-lori/',
      'medium   : https://chud-lori.medium.com/'
    ].join('\n')),

    whoami: () => COMMANDS.about(),

    projects: () => {
      const rows = Object.entries(PROJECTS).map(([name, p]) => {
        const padded = (name + ' '.repeat(18)).slice(0, 18);
        return `  <span class="bright">${padded}</span>${escapeHtml(p.desc)}`;
      });
      printRaw([
        '<span class="dim">$ ls -la /projects</span>',
        '',
        ...rows,
        '',
        '<span class="dim">→ </span><span class="bright">open &lt;name&gt;</span><span class="dim"> to navigate.</span>',
        ''
      ].join('\n'));
    },

    ls:  () => COMMANDS.projects(),
    dir: () => COMMANDS.projects(),

    open: (args) => {
      const name = (args[0] || '').toLowerCase();
      if (!name) {
        print('usage: open <project>', 'warn');
        print('try: ' + Object.keys(PROJECTS).join(', '), 'dim');
        return;
      }
      const p = PROJECTS[name];
      if (!p) {
        print(`no such project: ${name}`, 'err');
        print('try: ' + Object.keys(PROJECTS).join(', '), 'dim');
        return;
      }
      print(`opening ${p.url} ...`, 'dim');
      window.open(p.url, '_blank', 'noopener');
    },

    contact: () => print([
      'email    : ' + SOCIALS.email,
      'github   : ' + SOCIALS.github,
      'linkedin : ' + SOCIALS.linkedin,
      'medium   : ' + SOCIALS.medium,
      'location : indonesia',
      '',
      'best path: drop an email. low-friction, no algorithm in the way.'
    ].join('\n')),

    whois: (args) => {
      if ((args[0] || '').toLowerCase() !== 'lori') {
        print('whois: only `whois lori` is registered here.', 'warn');
        return;
      }
      print([
        '% whois lori',
        '',
        'domain        : chud-lori.os',
        'status        : active',
        'registered    : 1945 (give or take)',
        'last-updated  : ' + new Date().toISOString().slice(0,10),
        'nameserver    : coffee.lori.my.id',
        'nameserver    : deadline.lori.my.id',
        '',
        'person        : lori',
        'title         : senior backend engineer',
        'employer      : 99.co',
        'language      : go, python, javascript, c',
        'editor        : neovim (currently)',
        'mood          : undercaffeinated'
      ].join('\n'));
    },

    uptime: () => {
      const years = new Date().getFullYear() - 2018;
      print([
        ` up: ~${years} years since first public commit`,
        ' load average: 0.99, 1.42, 2.71',
        ' contributing: most days, intensity varies'
      ].join('\n'));
    },

    now: () => print([
      'now playing  : rusty-requester (rust + egui http client)',
      'now reading  : `crafting interpreters`, plus too many tabs',
      'now shipping : 99.co — backend systems, search & routing',
      'last updated : ' + new Date().toISOString().slice(0,7),
      '',
      '→ profile.lori.my.id has the deeper, fresher version.'
    ].join('\n')),

    clear: () => { out.innerHTML = ''; },
    cls:   () => { out.innerHTML = ''; },

    echo: (args) => print(args.join(' ')),

    // --- easter eggs ---

    sudo: () => print('lori is not in the sudoers file. this incident will be reported.', 'err'),
    su:   () => COMMANDS.sudo(),

    rm: () => print('nice try. this isn\'t your machine.', 'warn'),

    vim:   () => print(':wq is enough. :wq! is admitting defeat.', 'dim'),
    emacs: () => print('would print, but the keystroke combo is still loading.', 'dim'),
    nano:  () => print('respect.', 'dim'),

    coffee: () => printRaw([
      '   <span class="dim">( ( (</span>',
      '   <span class="dim"> ) ) )</span>',
      '  ........',
      '  |      |]',
      '  \\      /',
      '   `----\'',
      '',
      'brewing... <span class="bright">☕</span>'
    ].join('\n')),

    cat: (args) => {
      const f = args[0] || '';
      if (f === '/etc/passwd') return print('bruh.', 'warn');
      if (f === '/dev/random') return print('░░▒▓█▓▒░ kjf3l9xq*&^%$ ░▒▓█▓▒░░', 'dim');
      if (f === 'about.txt') return COMMANDS.about();
      if (!f) return print('cat: missing operand', 'warn');
      print(`cat: ${f}: no such file or directory`, 'err');
    },

    make: (args) => {
      if (args.join(' ').toLowerCase().includes('sandwich')) {
        return print('what? make it yourself.', 'warn');
      }
      print('xkcd.com/149', 'dim');
    },

    top: () => print([
      'PID  USER  %CPU  %MEM  COMMAND',
      '  1  lori   0.1  99.0  caffeine-daemon',
      '  2  lori   3.2  24.0  side-projects (rust)',
      '  3  lori   1.0   8.0  $DAYJOB (go, python)',
      '  4  lori  47.0  12.0  meetings'
    ].join('\n')),

    ps: () => COMMANDS.top(),

    exit:   () => print('there\'s no exit. only commands.', 'dim'),
    logout: () => COMMANDS.exit(),
    quit:   () => COMMANDS.exit(),

    man: () => print('man is too lazy. try `help` instead.', 'dim'),

    fortune: () => {
      const xs = [
        'premature optimization is the root of all evil — but un-optimization isn\'t free either.',
        '"works on my machine" is a confession, not a defence.',
        'low-spec first. then add complexity as required.',
        'native > electron, when you can afford the build matrix.',
        'every solo project is a love letter to your future self.',
        'the bug isn\'t where you\'re looking. it never is.'
      ];
      print(xs[Math.floor(Math.random() * xs.length)], 'dim');
    },

    date: () => print(new Date().toString()),

    hire: () => print([
      'looking? cool.',
      '',
      'cv      : https://profile.lori.my.id/',
      'email   : reachme@lori.my.id',
      '',
      'biased toward: backend, systems, infra-adjacent, low-bullshit teams.',
      'not biased toward: ad-tech, dark patterns.'
    ].join('\n'))
  };

  // Names exposed to `help` and tab-completion. Easter eggs intentionally
  // omitted — they're discoverable only by trying real shell commands.
  const VISIBLE = ['help','about','projects','open','contact','whois','uptime',
                   'now','clear','cls','ls'];
  const ALL_NAMES = Object.keys(COMMANDS);

  const history = [];
  let histIdx = -1;

  function run(raw) {
    const trimmed = raw.trim();
    echoCommand(raw);
    if (!trimmed) return;
    history.unshift(trimmed);
    histIdx = -1;

    const parts = trimmed.split(/\s+/);
    const name = parts[0].toLowerCase();
    const args = parts.slice(1);
    const fn = COMMANDS[name];
    if (fn) {
      try { fn(args); }
      catch (e) { print('runtime error: ' + e.message, 'err'); }
    } else {
      print(`command not found: ${name}`, 'err');
      print('type `help` for a list.', 'dim');
    }
  }

  function autocomplete() {
    const v = cmd.value;
    if (!v) return;
    const matches = ALL_NAMES.filter(c => c.startsWith(v.toLowerCase()));
    if (matches.length === 0) return;
    if (matches.length === 1) {
      cmd.value = matches[0] + ' ';
      return;
    }
    echoCommand(v);
    printRaw(matches.join('   '), 'dim');
  }

  cmd.addEventListener('keydown', (e) => {
    if (!booted) skipBoot();

    if (e.key === 'Enter') {
      e.preventDefault();
      run(cmd.value);
      cmd.value = '';
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (history.length === 0) return;
      histIdx = Math.min(histIdx + 1, history.length - 1);
      cmd.value = history[histIdx];
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (histIdx <= 0) { histIdx = -1; cmd.value = ''; return; }
      histIdx -= 1;
      cmd.value = history[histIdx];
    } else if (e.key === 'Tab') {
      e.preventDefault();
      autocomplete();
    } else if (e.key === 'l' && e.ctrlKey) {
      e.preventDefault();
      out.innerHTML = '';
    } else if (e.key === 'c' && e.ctrlKey) {
      echoCommand(cmd.value + '^C');
      cmd.value = '';
    }
  });

  // Tap / click anywhere refocuses the prompt — important on mobile.
  document.addEventListener('click', () => cmd.focus());

  // --- konami code easter egg ----------------------------------------------

  const KONAMI = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown',
                  'ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
  let konamiBuf = [];
  let amberUnlocked = false;

  document.addEventListener('keydown', (e) => {
    const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
    konamiBuf.push(k);
    if (konamiBuf.length > KONAMI.length) konamiBuf.shift();
    if (konamiBuf.length === KONAMI.length &&
        konamiBuf.every((x, i) => x === KONAMI[i])) {
      konamiBuf = [];
      if (!amberUnlocked) {
        amberUnlocked = true;
        document.body.classList.add('amber');
        printRaw('<span class="bright">█ phosphor color: amber █</span> <span class="dim">(welcome back to 1981)</span>');
      } else {
        amberUnlocked = false;
        document.body.classList.remove('amber');
        printRaw('<span class="bright">█ phosphor color: green █</span>');
      }
    }
  });

  // --- devtools easter egg -------------------------------------------------

  const consoleArt = [
    '',
    '  ____ _                 _      _            _ ',
    ' / ___| |__  _   _  __| |    | | ___  _ __(_)',
    '| |   | \'_ \\| | | |/ _` |____| |/ _ \\| \'__| |',
    '| |___| | | | |_| | (_| |____| | (_) | |  | |',
    ' \\____|_| |_|\\__,_|\\__,_|    |_|\\___/|_|  |_|',
    '',
    '% you found the console.',
    '% if you\'re reading this, you\'re my kind of dev.',
    '% drop me a line — reachme@lori.my.id',
    '%',
    '% — lori'
  ].join('\n');

  console.log(
    '%c' + consoleArt,
    'color: #4af56b; font-family: ui-monospace, Menlo, monospace; font-size: 12px; line-height: 1.4;'
  );

  boot();
  cmd.focus();
})();
</script>

</body>
</html>
