<style>
:root {
  --bg: #0a0d0a;
  --fg: #4af56b;
  --fg-dim: #5cc070;
  --fg-bright: #b4ffc6;
  --warn: #ffb14a;
  --err: #ff5a5a;
  --font: ui-monospace, "SF Mono", "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace;
}
/* Amber palette swap, applied by the Konami egg. */
body.amber {
  --fg: #ffb454;
  --fg-dim: #d18f3a;
  --fg-bright: #ffe0a8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; width: 100%; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.45;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* CRT chrome — scanlines + vignette + flicker. All overlays, none block input. */
body::before {
  content: "";
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.025) 0px,
    rgba(255,255,255,0.025) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
  z-index: 2;
  mix-blend-mode: overlay;
}
body::after {
  content: "";
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, transparent 78%, rgba(0,0,0,0.28) 100%);
  pointer-events: none;
  z-index: 3;
}
@keyframes flicker {
  0%, 100% { opacity: 1; }
  98% { opacity: 1; }
  99% { opacity: 0.93; }
}
.screen { animation: flicker 6s infinite; }

#screen {
  position: relative;
  height: 100%;
  width: 100%;
  padding: 24px 28px;
  overflow-y: auto;
  z-index: 1;
  text-shadow: 0 0 6px rgba(74, 245, 107, 0.35);
}
body.amber #screen { text-shadow: 0 0 6px rgba(255, 180, 84, 0.4); }

#output { white-space: pre-wrap; word-break: break-word; }
.line { white-space: pre-wrap; word-break: break-word; }
.echo .prompt { color: var(--fg-dim); }
.echo .cmd-text { color: var(--fg-bright); }
.dim { color: var(--fg-dim); }
.bright { color: var(--fg-bright); }
.warn { color: var(--warn); }
.err { color: var(--err); }
a { color: var(--fg-bright); text-decoration: underline; text-decoration-color: var(--fg-dim); }
a:hover { color: var(--bg); background: var(--fg-bright); text-decoration: none; }

#prompt-line {
  display: flex;
  align-items: center;
  white-space: pre;
}
#prompt-line .prompt { color: var(--fg-dim); flex: 0 0 auto; }
#cmd {
  flex: 1 1 auto;
  background: transparent;
  border: none;
  outline: none;
  color: var(--fg-bright);
  font: inherit;
  caret-color: var(--fg-bright);
  padding: 0;
  text-shadow: inherit;
  min-width: 0;
}

::selection { background: var(--fg); color: var(--bg); }

@media (max-width: 640px) {
  body { font-size: 13px; }
  #screen { padding: 14px 16px; }
}

/* Fullscreen overlay used by matrix / donut / snake / sl. */
#app-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 4;
  overflow: hidden;
  padding: 20px;
}
#app-pre {
  font: inherit;
  font-size: inherit;
  line-height: 1.05;
  color: var(--fg);
  white-space: pre;
  margin: 0;
  text-shadow: 0 0 6px rgba(74, 245, 107, 0.35);
}
body.amber #app-pre {
  text-shadow: 0 0 6px rgba(255, 180, 84, 0.4);
}
.mx-h { color: var(--fg-bright); filter: brightness(1.3); }
.mx-m { color: var(--fg); }
.mx-d { color: var(--fg-dim); opacity: 0.75; }

/* CRT power-off / power-on, used by the `exit` command. */
#screen.crt-off { animation: crt-shutoff 0.9s ease-in forwards; transform-origin: 50% 50%; }
#screen.crt-on  { animation: crt-poweron 0.8s ease-out forwards; transform-origin: 50% 50%; }
@keyframes crt-shutoff {
  0%   { transform: scaleY(1)     scaleX(1);     filter: brightness(1); }
  40%  { transform: scaleY(0.005) scaleX(1);     filter: brightness(2.5); }
  75%  { transform: scaleY(0.005) scaleX(0.005); filter: brightness(6); opacity: 1; }
  100% { transform: scaleY(0)     scaleX(0);     filter: brightness(0); opacity: 0; }
}
@keyframes crt-poweron {
  0%   { transform: scaleY(0)     scaleX(0);     opacity: 0; filter: brightness(0); }
  25%  { transform: scaleY(0.005) scaleX(0.005); opacity: 1; filter: brightness(6); }
  60%  { transform: scaleY(0.005) scaleX(1);     opacity: 1; filter: brightness(2.5); }
  100% { transform: scaleY(1)     scaleX(1);     opacity: 1; filter: brightness(1); }
}
#app-hint {
  position: fixed;
  bottom: 12px;
  right: 16px;
  z-index: 5;
  color: var(--fg-dim);
  font-family: var(--font);
  font-size: 11px;
  pointer-events: none;
  opacity: 0.8;
}
</style>

<script>
(() => {
  const out = document.getElementById('output');
  const cmd = document.getElementById('cmd');
  const screen = document.getElementById('screen');
  const PROMPT = 'lori@chud-lori.github.io:~$&nbsp;';

  const PROJECTS = {
    'rusty-requester': {
      url: 'https://chud-lori.github.io/rusty-requester/',
      desc: 'native http api client. rust + egui. ~15mb binary. postman without electron.'
    },
    'go-boilerplate': {
      url: 'https://github.com/chud-lori/go-boilerplate',
      desc: 'production-ready go service template. clean arch, rest + grpc, redis, testcontainers, ci.'
    },
    'moco': {
      url: 'https://moco.lori.my.id/',
      desc: 'calm reader for personal libraries. pdf / epub / md. go + sqlite + optional r2.'
    },
    'cornela': {
      url: 'https://github.com/chud-lori/cornela',
      desc: 'container kernel auditor. rust + ebpf + c. flags shared-kernel escape risk on linux.'
    },
    'milog': {
      url: 'https://github.com/chud-lori/milog',
      desc: 'single-file bash monitor for nginx + host. optional ebpf sidecar. alerts to discord/slack/telegram/matrix.'
    },
    'cendek': {
      url: 'https://github.com/chud-lori/cendek',
      desc: 'dependency-free rust url shortener. one binary + a tsv file. no db, no orm, no framework.'
    },
    'sinau': {
      url: 'https://github.com/chud-lori/sinau',
      desc: 'invite-only mentor/teacher tracker. mentorship rooms + classrooms in one app. go + sqlite.'
    },
    'finan-app': {
      url: 'https://finance.lori.my.id/',
      desc: 'private finance tracker. anomaly alerts + "can i afford this?" tools. node + postgres.'
    },
    'blog-mcp': {
      url: 'https://github.com/chud-lori/medium-blog-mcp',
      desc: 'mcp server that turns my blog into context for claude / cursor. python + chromadb.'
    },
    'knn-flask': {
      url: 'https://github.com/chud-lori/heart-disease-knn-flask',
      desc: 'heart-disease prediction. published paper. python + flask + knn.'
    },
    'profile': {
      url: 'https://profile.lori.my.id/',
      desc: 'the real portfolio. resume, experience, projects, writing.'
    }
  };

  const SOCIALS = {
    email:    'reachme@lori.my.id',
    github:   'https://github.com/chud-lori',
    linkedin: 'https://linkedin.com/in/chud-lori/',
    medium:   'https://chud-lori.medium.com/',
    profile:  'https://profile.lori.my.id/',
    blog:     'https://lori.my.id/'
  };

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  function linkify(s) {
    return s
      .replace(/(https?:\/\/[^\s)]+)/g, (u) => `<a href="${u}" target="_blank" rel="noopener">${u}</a>`)
      .replace(/([a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,})/gi, (e) => `<a href="mailto:${e}">${e}</a>`);
  }

  function print(text, cls = '') {
    const div = document.createElement('div');
    div.className = 'line ' + cls;
    div.innerHTML = linkify(text === null || text === undefined ? '' : String(text));
    out.appendChild(div);
    scrollDown();
  }

  function printRaw(html, cls = '') {
    const div = document.createElement('div');
    div.className = 'line ' + cls;
    div.innerHTML = html;
    out.appendChild(div);
    scrollDown();
  }

  function echoCommand(text) {
    const div = document.createElement('div');
    div.className = 'line echo';
    div.innerHTML = `<span class="prompt">${PROMPT}</span><span class="cmd-text">${escapeHtml(text)}</span>`;
    out.appendChild(div);
  }

  function scrollDown() {
    screen.scrollTop = screen.scrollHeight;
  }

  const BOOT = [
    '> chud-lori.os v1.0 — phosphor warmup complete',
    '',
    '[<span class="bright">OK</span>] mounting /home/lori .......... ok',
    '[<span class="bright">OK</span>] loading identity ............. lori',
    `[<span class="bright">OK</span>] indexing /projects ........... ${Object.keys(PROJECTS).length} found`,
    '[<span class="bright">OK</span>] socials online ............... ok',
    '',
    '<span class="dim">you stripped the path. respect.</span>',
    'type <span class="bright">help</span> to see what&rsquo;s here.',
    ''
  ];

  let bootTimer = null;
  let booted = false;

  function boot() {
    let i = 0;
    function tick() {
      if (i >= BOOT.length) { booted = true; cmd.focus(); return; }
      printRaw(BOOT[i++], 'boot');
      bootTimer = setTimeout(tick, i < 3 ? 140 : 70);
    }
    tick();
  }

  function skipBoot() {
    if (booted) return;
    clearTimeout(bootTimer);
    out.innerHTML = '';
    for (const l of BOOT) printRaw(l, 'boot');
    booted = true;
  }

  // ─── exit: confirm + crt power-off / power-on ─────────────────────────

  let pendingExitConfirm = false;

  function runExitAnimation() {
    const screen = document.getElementById('screen');
    if (screen.dataset.exiting === '1') return;
    screen.dataset.exiting = '1';
    cmd.disabled = true;

    const lines = [
      '<span class="warn">shutting down chud-lori.os ...</span>',
      '[<span class="bright">--</span>] saving session state ............ ok',
      '[<span class="bright">--</span>] stopping caffeine-daemon ......... ok',
      '[<span class="bright">--</span>] flushing thoughts to /dev/null ... ok',
      '[<span class="bright">--</span>] closing 47 open tabs ............. <span class="warn">deferred</span>',
      '<span class="dim">powering off display ...</span>'
    ];
    lines.forEach((l, i) => setTimeout(() => printRaw(l), i * 160));
    const settled = lines.length * 160;

    setTimeout(() => { screen.classList.add('crt-off'); }, settled + 120);

    setTimeout(() => {
      printRaw('');
      printRaw('<span class="bright">...just kidding.</span>');
      printRaw('<span class="dim">there&rsquo;s no exit. only commands.</span>');
      printRaw('<span class="dim">welcome back. try `</span><span class="bright">help</span><span class="dim">` again.</span>');
      printRaw('');
      scrollDown();
      screen.classList.remove('crt-off');
      screen.classList.add('crt-on');
    }, settled + 1100);

    setTimeout(() => {
      screen.classList.remove('crt-on');
      screen.dataset.exiting = '';
      cmd.disabled = false;
      cmd.focus();
    }, settled + 2000);
  }

  // ─── fullscreen apps: matrix / donut / snake / sl ─────────────────────

  let currentApp = null;

  function startApp(hintText) {
    if (currentApp) return null;
    const overlay = document.createElement('div');
    overlay.id = 'app-overlay';
    const pre = document.createElement('pre');
    pre.id = 'app-pre';
    overlay.appendChild(pre);
    document.body.appendChild(overlay);
    let hint = null;
    if (hintText) {
      hint = document.createElement('div');
      hint.id = 'app-hint';
      hint.textContent = hintText;
      document.body.appendChild(hint);
    }
    cmd.disabled = true;
    document.getElementById('prompt-line').style.display = 'none';
    let stopped = false;
    const app = {
      overlay, pre,
      isStopped: () => stopped,
      center() {
        overlay.style.display = 'grid';
        overlay.style.placeItems = 'center';
      },
      stop() {
        if (stopped) return;
        stopped = true;
        overlay.remove();
        if (hint) hint.remove();
        document.getElementById('prompt-line').style.display = '';
        cmd.disabled = false;
        currentApp = null;
        cmd.focus();
      }
    };
    currentApp = app;
    return app;
  }

  function runMatrix() {
    const app = startApp('any key to exit');
    if (!app) return;
    const cw = 10, lh = 16;
    const cols = Math.max(30, Math.floor((window.innerWidth  - 40) / cw));
    const rows = Math.max(15, Math.floor((window.innerHeight - 40) / lh));
    const G = 'ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜｦﾝ0123456789';
    const drops = Array(cols).fill(0).map(() => Math.floor(Math.random() * -rows * 2));
    const TRAIL = 14;

    function frame() {
      if (app.isStopped()) return;
      const head = new Uint8Array(rows * cols);
      const mid  = new Uint8Array(rows * cols);
      const dim  = new Uint8Array(rows * cols);
      for (let c = 0; c < cols; c++) {
        const h = drops[c];
        for (let t = 0; t < TRAIL; t++) {
          const r = h - t;
          if (r < 0 || r >= rows) continue;
          const idx = r * cols + c;
          if (t === 0)      head[idx] = 1;
          else if (t < 3)   head[idx] = 1;
          else if (t < 8)   mid[idx]  = 1;
          else              dim[idx]  = 1;
        }
      }
      let html = '';
      let cur = '';
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const idx = r * cols + c;
          let cls = '';
          if (head[idx])      cls = 'mx-h';
          else if (mid[idx])  cls = 'mx-m';
          else if (dim[idx])  cls = 'mx-d';
          if (cls !== cur) {
            if (cur !== '') html += '</span>';
            if (cls !== '') html += '<span class="' + cls + '">';
            cur = cls;
          }
          html += cls === '' ? ' ' : G[(Math.random() * G.length) | 0];
        }
        if (cur !== '') { html += '</span>'; cur = ''; }
        html += '\n';
      }
      app.pre.innerHTML = html;
      for (let c = 0; c < cols; c++) {
        drops[c]++;
        if (drops[c] - TRAIL > rows && Math.random() < 0.06) {
          drops[c] = -Math.floor(Math.random() * 8);
        }
      }
      setTimeout(frame, 70);
    }

    const onKey = (e) => {
      e.preventDefault();
      app.stop();
    };
    document.addEventListener('keydown', onKey, { once: true, capture: true });
    frame();
  }

  function runDonut() {
    const app = startApp('any key to exit');
    if (!app) return;
    app.center();
    const W = 60, H = 28;
    let A = 0, B = 0;

    function frame() {
      if (app.isStopped()) return;
      const b = new Array(W * H).fill(' ');
      const z = new Float32Array(W * H);
      for (let j = 0; j < 6.28; j += 0.07) {
        const d = Math.cos(j), f = Math.sin(j);
        for (let i = 0; i < 6.28; i += 0.02) {
          const c = Math.sin(i), l = Math.cos(i);
          const e = Math.sin(A), g = Math.cos(A);
          const m = Math.cos(B), n = Math.sin(B);
          const h = d + 2;
          const D = 1 / (c * h * e + f * g + 5);
          const t = c * h * g - f * e;
          const x = Math.floor(W / 2 + (W * 0.42) * D * (l * h * m - t * n));
          const y = Math.floor(H / 2 + (H * 0.42) * D * (l * h * n + t * m));
          const N = Math.floor(8 * ((f * e - c * d * g) * m - c * d * e - f * g - l * d * n));
          if (y >= 0 && y < H && x >= 0 && x < W) {
            const o = x + W * y;
            if (D > z[o]) { z[o] = D; b[o] = '.,-~:;=!*#$@'[N > 0 ? N : 0]; }
          }
        }
      }
      let out = '';
      for (let k = 0; k < H; k++) out += b.slice(k * W, (k + 1) * W).join('') + '\n';
      app.pre.textContent = out;
      A += 0.05;
      B += 0.025;
      setTimeout(frame, 50);
    }

    const onKey = (e) => {
      e.preventDefault();
      app.stop();
    };
    document.addEventListener('keydown', onKey, { once: true, capture: true });
    frame();
  }

  function runSL() {
    const app = startApp('ctrl+c / esc to abort');
    if (!app) return;
    const train = [
      '      ====        ________                ___________',
      '  _D _|  |_______/        \\__I_I_____===__|_________|',
      '   |(_)---  |   H\\________/ |   |        =|___ ___|  ',
      '   /     |  |   H  |  |     |   |         ||_| |_||  ',
      '  |      |  |   H  |__--------------------| [___] |  ',
      '  | ________|___H__/__|_____/[][]~\\_______|       |  ',
      '  |/ |   |-----------I_____I [][] []  D   |=======|__',
      '__/ =| o |=-~~\\  /~~\\  /~~\\  /~~\\ ____Y___________|__',
      ' |/-=|___|=    ||    ||    ||    |_____/~\\___/       ',
      '  \\_/      \\_O=O=O=O=O=O_/      \\_/                  '
    ];
    const tw = train[0].length;
    const cols = Math.max(80, Math.floor((window.innerWidth  - 40) /  9));
    const rows = Math.max(20, Math.floor((window.innerHeight - 40) / 18));
    const topPad = Math.max(0, Math.floor((rows - train.length) / 2));
    let x = cols;

    function frame() {
      if (app.isStopped()) return;
      const lines = train.map(line => {
        let r = '';
        for (let c = 0; c < cols; c++) {
          const tc = c - x;
          r += (tc >= 0 && tc < tw) ? line[tc] : ' ';
        }
        return r;
      });
      app.pre.textContent = '\n'.repeat(topPad) + lines.join('\n');
      x -= 2;
      if (x + tw < 0) { app.stop(); return; }
      setTimeout(frame, 60);
    }

    const onKey = (e) => {
      if ((e.key === 'c' && e.ctrlKey) || e.key === 'Escape' || e.key === 'q') {
        e.preventDefault();
        document.removeEventListener('keydown', onKey, true);
        app.stop();
      }
    };
    document.addEventListener('keydown', onKey, true);
    frame();
  }

  function runHtop() {
    const app = startApp('q · esc to quit');
    if (!app) return;
    app.center();
    const barW = window.innerWidth < 500 ? 18 : 38;

    const procs = [
      { pid:    1, user: 'lori', cpu:  0.1, mem: 99.0, cmd: 'caffeine-daemon'   },
      { pid:  412, user: 'lori', cpu:  3.2, mem: 24.0, cmd: 'side-projects.rs'  },
      { pid:  891, user: 'lori', cpu:  1.0, mem:  8.0, cmd: '$DAYJOB.go'        },
      { pid: 1024, user: 'lori', cpu: 47.0, mem: 12.0, cmd: 'meetings.zoom'     },
      { pid: 2048, user: 'lori', cpu:  6.5, mem: 18.0, cmd: 'nvim --headless'   },
      { pid: 4096, user: 'lori', cpu:  0.8, mem:  4.0, cmd: 'sleep-debt.sh'     },
      { pid: 8192, user: 'lori', cpu: 12.0, mem: 14.0, cmd: 'open-tabs.firefox' }
    ];

    function jitter(v, amp) {
      let r = v + (Math.random() * 2 - 1) * amp;
      if (r <  0.1) r =  0.1;
      if (r > 99.9) r = 99.9;
      return r;
    }
    function bar(pct, w) {
      const fill = Math.max(0, Math.min(w, Math.round((pct / 100) * w)));
      return '█'.repeat(fill) + '░'.repeat(w - fill);
    }
    function pad(s, w, right) {
      s = String(s);
      return right ? s.padStart(w) : s.padEnd(w);
    }

    function frame() {
      if (app.isStopped()) return;
      procs.forEach(p => { p.cpu = jitter(p.cpu, 3); p.mem = jitter(p.mem, 1.2); });
      const cpuAvg = procs.reduce((s, p) => s + p.cpu, 0) / procs.length;
      const memAvg = procs.reduce((s, p) => s + p.mem, 0) / procs.length;
      const l1 = cpuAvg / 25, l5 = l1 * 1.4, l15 = l1 * 2.7;
      const lines = [
        '  CPU [' + bar(cpuAvg, barW) + '] ' + cpuAvg.toFixed(1).padStart(4) + '%',

        '  ────  ─────  ────  ────  ───────────────────'
      ];
      const sorted = [...procs].sort((a, b) => b.cpu - a.cpu);
      sorted.forEach(p => {
        lines.push(
          '  ' + pad(p.pid, 4, true) +

          '  ' + pad(p.cpu.toFixed(1), 4, true) +
          '  ' + pad(p.mem.toFixed(1), 4, true) +

  function runSnake() {
    const app = startApp('arrows · q/esc quit · r retry');
    if (!app) return;
    app.center();
    const W = 24, H = 14;
    let snake, dir, pending, food, score, alive, speed;

    function spawnFood() {
      while (true) {
        const f = [Math.floor(Math.random() * W), Math.floor(Math.random() * H)];
        if (!snake.some(s => s[0] === f[0] && s[1] === f[1])) return f;
      }
    }
    function reset() {
      snake = [[Math.floor(W / 2), Math.floor(H / 2)]];
      dir = [1, 0]; pending = dir;
      food = spawnFood();
      score = 0; alive = true; speed = 130;
    }
    reset();

    function render() {
      const lines = [];
      lines.push('┌' + '─'.repeat(W * 2) + '┐');
      for (let y = 0; y < H; y++) {
        let line = '│';
        for (let x = 0; x < W; x++) {
          const isHead = snake[0][0] === x && snake[0][1] === y;
          const isBody = !isHead && snake.some(s => s[0] === x && s[1] === y);
          const isFood = food[0] === x && food[1] === y;
          if      (isHead) line += '██';
          else if (isBody) line += '▓▓';
          else if (isFood) line += '●●';
          else             line += '  ';
        }
        lines.push(line + '│');
      }
      lines.push('└' + '─'.repeat(W * 2) + '┘');
      lines.push('');
      lines.push(alive
        ? ' score: ' + String(score).padStart(4, '0')
        : ' GAME OVER · score: ' + String(score).padStart(4, '0') + '  [r] retry');
      app.pre.textContent = lines.join('\n');
    }

    function step() {
      if (app.isStopped()) return;
      if (alive) {
        dir = pending;
        const head = [snake[0][0] + dir[0], snake[0][1] + dir[1]];
        if (head[0] < 0 || head[0] >= W || head[1] < 0 || head[1] >= H ||
            snake.some(s => s[0] === head[0] && s[1] === head[1])) {
          alive = false;
        } else {
          snake.unshift(head);
          if (head[0] === food[0] && head[1] === food[1]) {
            score += 10;
            speed = Math.max(60, speed - 3);
            food = spawnFood();
          } else {
            snake.pop();
          }
        }
      }
      render();
      setTimeout(step, alive ? speed : 220);
    }

    const onKey = (e) => {
      const k = e.key;
      if (k === 'q' || k === 'Escape') {
        e.preventDefault();
        document.removeEventListener('keydown', onKey, true);
        app.stop();
        return;
      }
      if (k === 'r' && !alive) { e.preventDefault(); reset(); return; }
      if (!alive) return;
      if (k === 'ArrowUp'    && dir[1] !==  1) { e.preventDefault(); pending = [ 0, -1]; }
      if (k === 'ArrowDown'  && dir[1] !== -1) { e.preventDefault(); pending = [ 0,  1]; }
      if (k === 'ArrowLeft'  && dir[0] !==  1) { e.preventDefault(); pending = [-1,  0]; }
      if (k === 'ArrowRight' && dir[0] !== -1) { e.preventDefault(); pending = [ 1,  0]; }
    };
    document.addEventListener('keydown', onKey, true);
    render();
    step();
  }

      }
      return;
    }

    if (!trimmed) return;
    history.unshift(trimmed);
    histIdx = -1;

    const parts = trimmed.split(/\s+/);
    const name = parts[0].toLowerCase();
    const args = parts.slice(1);
    const fn = COMMANDS[name];
    if (fn) {
      try { fn(args); }
      catch (e) { print('runtime error: ' + e.message, 'err'); }
    } else {
      print(`command not found: ${name}`, 'err');
      print('type `help` for a list.', 'dim');
    }
  }

  function autocomplete() {
    const v = cmd.value;
    if (!v) return;
    const matches = ALL_NAMES.filter(c => c.startsWith(v.toLowerCase()));
    if (matches.length === 0) return;
    if (matches.length === 1) {
      cmd.value = matches[0] + ' ';
      return;
    }
    echoCommand(v);
    printRaw(matches.join('   '), 'dim');
  }

  cmd.addEventListener('keydown', (e) => {
    if (!booted) skipBoot();

    if (e.key === 'Enter') {
      e.preventDefault();
      run(cmd.value);
      cmd.value = '';
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (history.length === 0) return;
      histIdx = Math.min(histIdx + 1, history.length - 1);
      cmd.value = history[histIdx];
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (histIdx <= 0) { histIdx = -1; cmd.value = ''; return; }
      histIdx -= 1;
      cmd.value = history[histIdx];
    } else if (e.key === 'Tab') {
      e.preventDefault();
      autocomplete();
    } else if (e.key === 'l' && e.ctrlKey) {
      e.preventDefault();
      out.innerHTML = '';
    } else if (e.key === 'c' && e.ctrlKey) {
      echoCommand(cmd.value + '^C');
      cmd.value = '';
    }
  });

  // Tap / click anywhere refocuses the prompt — important on mobile.
  document.addEventListener('click', () => cmd.focus());

  // --- konami code easter egg ----------------------------------------------

  const KONAMI = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown',
                  'ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
  let konamiBuf = [];
  let amberUnlocked = false;

  document.addEventListener('keydown', (e) => {
    const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
    konamiBuf.push(k);
    if (konamiBuf.length > KONAMI.length) konamiBuf.shift();
    if (konamiBuf.length === KONAMI.length &&
        konamiBuf.every((x, i) => x === KONAMI[i])) {
      konamiBuf = [];
      if (!amberUnlocked) {
        amberUnlocked = true;
        document.body.classList.add('amber');
        printRaw('<span class="bright">█ phosphor color: amber █</span> <span class="dim">(welcome back to 1981)</span>');
      } else {
        amberUnlocked = false;
        document.body.classList.remove('amber');
        printRaw('<span class="bright">█ phosphor color: green █</span>');
      }
    }
  });

  // --- devtools easter egg -------------------------------------------------

  const consoleArt = [
    '',
    '  ____ _                 _      _            _ ',
    ' / ___| |__  _   _  __| |    | | ___  _ __(_)',
    '| |   | \'_ \\| | | |/ _` |____| |/ _ \\| \'__| |',
    '| |___| | | | |_| | (_| |____| | (_) | |  | |',
    ' \\____|_| |_|\\__,_|\\__,_|    |_|\\___/|_|  |_|',
    '',
    '% you found the console.',
    '% if you\'re reading this, you\'re my kind of dev.',
    '% drop me a line — reachme@lori.my.id',
    '%',
    '% — lori'
  ].join('\n');

  console.log(
    '%c' + consoleArt,
    'color: #4af56b; font-family: ui-monospace, Menlo, monospace; font-size: 12px; line-height: 1.4;'
  );

  boot();
  cmd.focus();
})();
</script>
